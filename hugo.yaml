baseURL: "https://aitechy226.github.io/"
languageCode: "en-us"
title: "The Practical AI Builder"
theme: "PaperMod"
paginate: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "The Practical AI Builder"
  description: "Field notes on building AI systems that actually work in production."
  author: "Srikanth Samudrla"
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    disableHLJS: true

  label:
    text: "Srikanth Samudrla"

  homeInfoParams:
    Title: "The Practical AI Builder"
    Content: >
      Field notes on designing AI systems to production-grade standards.
      Agentic architecture, infrastructure tooling, and the gap between demos and deployment.

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/srikanthsamudrla/"

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true


  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: start
      name: Start Here
      url: /start/
      weight: 5
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: search
      name: Search
      url: /search/
      weight: 40
    - identifier: sri-system
      name: Sri System
      url: /posts/professional-digital-twin/
      weight: 50

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
